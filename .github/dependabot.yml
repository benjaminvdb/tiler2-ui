version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-major-days: 21
      semver-minor-days: 7
      semver-patch-days: 2
    labels:
      - "dependencies"
      - "frontend"
    groups:
      ai-sdk:
        applies-to: version-updates
        patterns:
          - "ai"
          - "@ai-sdk/*"
        update-types:
          - "minor"
          - "patch"
      production-minor-patch:
        applies-to: version-updates
        dependency-type: "production"
        exclude-patterns:
          - "ai"
          - "@ai-sdk/*"
        update-types:
          - "minor"
          - "patch"
      development-minor-patch:
        applies-to: version-updates
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      workflow-actions:
        patterns:
          - "*"
